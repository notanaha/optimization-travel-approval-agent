kind: hosted
name: travel-approval-agent
description: |
    A basic Agent Framework agent hosted by Foundry.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Streaming
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
    - name: OPTIMIZATION_LOCAL_DIR
      value: .agent_configs